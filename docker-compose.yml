services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: agiles_sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "AgilesSql2026!"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'AgilesSql2026!' -Q 'SELECT 1' -C || /opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P 'AgilesSql2026!' -Q 'SELECT 1'"
        ]
      interval: 10s
      timeout: 5s
      retries: 20

volumes:
  sqlserver_data:
